<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support & Feedback — Terhathum</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="feedback.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<nav class="site-nav">

    <a href="index.html" class="brand">Terhathum</a>

    <button class="nav-toggle" id="navToggle">☰</button>

    <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="feedback.html" class="active">Support</a></li>
    </ul>

</nav>

<section class="feedback-hero">

    <div class="feedback-content">

        <span class="eyebrow">Support</span>

        <h1>
            We'd love to
            <em>hear from you</em>
        </h1>

        <p class="lede">
            Have questions about Terhathum or want to leave a note?
            Drop your details below.
        </p>

    </div>

</section>

<section class="feedback-section" id="main">

<div class="feedback-card">

<form id="feedbackForm" action="https://formspree.io/f/xpqvroop" method="POST">

    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Your Name" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>

    <label for="topic">Topic</label>

    <select id="topic" name="topic">

        <option>General Inquiry</option>
        <option>Technical Support</option>
        <option>Website Feedback</option>

    </select>

    <label for="message">Message</label>

    <textarea
        id="message"
        name="message"
        rows="7"
        placeholder="Write your thoughts here..."
        required
    ></textarea>

    <!-- Honeypot field: hidden from real users, bots often fill it, Formspree drops the submission -->
    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

    <button class="feedback-btn" type="submit">
        Submit Feedback
    </button>

    <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>

</form>

</div>

</section>

<footer>
  <span>© Chalsh Guragain · Terhathum, Nepal</span>
</footer>

<script src="feedback.js"></script>
</body>
</html>
